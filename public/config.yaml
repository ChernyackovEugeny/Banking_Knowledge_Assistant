documents:
  # ===========================================================================
  # КЛАСТЕР 1: КОМПЛАЕНС И ПОД/ФТ
  # ===========================================================================
  - id: "RG-KIB-001"
    title: "Регламент проведения идентификации и верификации корпоративных клиентов"
    cluster: "compliance"
    doc_type: "internal_policy"
    doc_subtype: "procedure"
    responsible_dept: "dep_compliance_kib"
    approved_by: "Комитет по комплаенсу"
    approval_date: "15.01.2025"
    references: ["115-FZ", "499-P", "860-P"]
    key_topics:
      - "пошаговый процесс KYC для юридических лиц: приём документов, проверка, принятие решения"
      - "перечень обязательных документов для идентификации (устав, выписка ЕГРЮЛ, доверенность, паспорт ЕИО)"
      - "сроки идентификации: стандартная — 3 рабочих дня, углублённая — 7 рабочих дней"
      - "порядок установления бенефициарного владельца: цепочка владения до физлица, порог 25%"
      - "особенности для клиентов со сложной структурой владения (3+ уровня, офшоры, трасты)"
      - "обновление сведений: периодичность зависит от уровня риска клиента"
      - "порядок отказа в идентификации и уведомление ПОД/ФТ"
    tables:
      - "Матрица уровня проверки по типу клиента и уровню риска"
      - "Перечень документов для идентификации юрлиц-резидентов и нерезидентов"
    target_words: 3000
    dependencies: []

  - id: "RG-KIB-002"
    title: "Политика управления санкционным комплаенсом"
    cluster: "compliance"
    doc_type: "internal_policy"
    doc_subtype: "policy"
    responsible_dept: "dep_compliance_kib"
    approved_by: "Правление Банка"
    approval_date: "20.01.2025"
    references: ["115-FZ", "860-P"]
    key_topics:
      - "перечень санкционных списков для проверки: SDN (OFAC), ЕС, Росфинмониторинг, списки СБ ООН"
      - "порядок проверки контрагентов: при открытии счёта, при каждой сделке свыше 10 млн руб., при обновлении данных"
      - "действия при совпадении: полное, частичное, false positive — алгоритм разбора"
