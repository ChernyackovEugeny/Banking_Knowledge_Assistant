# -----------------------------------------------------------------------------
# ПАРАМЕТРЫ ГЕНЕРАЦИИ QA-ПАР
# -----------------------------------------------------------------------------
qa_generation:
  per_document: 10
  types:
    factoid:
      count: 4
      description: "Ответ содержится в одном пункте одного документа"
      example: "Кто одобряет кредит на 1.5 млрд рублей?"
    synthetic:
      count: 3
      description: "Ответ собирается из нескольких пунктов одного документа"
      example: "Опишите полный процесс рассмотрения кредитной заявки от подачи до одобрения"
    cross_document:
      count: 3
      description: "Требует информации из внутреннего регламента И нормативного акта ЦБ"
      example: "Как внутренний регламент KYC банка конкретизирует требования Положения 499-П к идентификации бенефициарных владельцев?"

  style_requirements:
    - "Вопросы должны звучать как реальные вопросы сотрудника банка"
    - "Не использовать формулировки типа 'Какой пункт регламента...'"
    - "Включать вопросы с конкретными цифрами: суммы, сроки, пороги"
    - "Включать вопросы-сценарии: 'Клиент из Кипра хочет открыть кредитную линию на 3 млрд — какие дополнительные проверки нужны?'"

# -----------------------------------------------------------------------------
# ПАРАМЕТРЫ ПАЙПЛАЙНА
# -----------------------------------------------------------------------------
pipeline:
  model: "claude-sonnet-4-20250514"
  max_tokens: 8000
  output_dir: "generated_docs"
  qa_output: "qa_dataset.json"
  metadata_output: "documents_metadata.json"

  # Порядок генерации (по зависимостям)
  generation_order:
    - "RG-KIB-013"  # Положение о КК — нет зависимостей, ссылается в других
    - "RG-KIB-011"  # Методика оценки заёмщика — нет зависимостей, ссылается в других
    - "RG-KIB-001"  # KYC — базовый для комплаенс-документов
    - "RG-KIB-005"  # ИБ — нет зависимостей
    - "RG-KIB-004"  # Уровни риска — зависит от 001
    - "RG-KIB-002"  # Санкции — зависит от 001
    - "RG-KIB-003"  # Подозрительные операции — зависит от 001, 002
    - "RG-KIB-010"  # Кредитная заявка — зависит от 001, 004
    - "RG-KIB-012"  # Мониторинг портфеля — зависит от 011
    - "RG-KIB-014"  # Опер.риски в кредитовании — зависит от 010, 011
    - "RG-KIB-020"  # Операции с ЦБ за счёт клиентов
    - "RG-KIB-021"  # Рыночный риск
    - "RG-KIB-022"  # Депозитарий
    - "RG-KIB-030"  # Регуляторная отчётность
    - "RG-KIB-031"  # Бухучёт
    - "RG-KIB-040"  # Конфликт интересов
    - "RG-KIB-041"  # Проверки ЦБ
    - "RG-KIB-042"  # Валютный контроль
