      quorum: "не менее 2/3 состава"
      chair: "Председатель Правления"

    - id: "credit_committee_kib"
      name: "Кредитный комитет блока КИБ"
      authority: "одобрение кредитных сделок от 500 млн до 2 млрд руб."
      quorum: "не менее 3 из 5 членов"
      chair: "Директор блока КИБ"
      members:
        - "Начальник Управления корпоративного кредитования"
        - "Начальник Управления рисков КИБ"
        - "Главный комплаенс-офицер КИБ"
        - "Начальник Юридического департамента"

    - id: "risk_committee"
      name: "Комитет по рискам"
      authority: "утверждение лимитов, методик оценки рисков, стресс-тестирование"
      quorum: "не менее 2/3 состава"
      chair: "Заместитель Председателя Правления по рискам"

    - id: "compliance_committee"
      name: "Комитет по комплаенсу"
      authority: "утверждение политик ПОД/ФТ, санкционного комплаенса, рассмотрение инцидентов"
      quorum: "не менее 2/3 состава"
      chair: "Главный комплаенс-офицер Банка"

  # Пороговые значения и лимиты
  thresholds:
    # KYC
    kyc_standard: "стандартная идентификация — все клиенты"
    kyc_enhanced: "углублённая проверка — клиенты с суммой операций свыше 100 млн руб./мес. или из высокорисковых юрисдикций"
    kyc_review_standard: "пересмотр не реже 1 раза в год"
    kyc_review_high_risk: "пересмотр не реже 1 раза в 6 месяцев"

    # Кредитование — полномочия одобрения
    credit_level1:
      limit: "до 500 млн руб."
      approver: "Начальник Управления корпоративного кредитования"
      condition: "при положительном заключении Управления рисков КИБ"
    credit_level2:
      limit: "от 500 млн до 2 млрд руб."
      approver: "Кредитный комитет блока КИБ"
      condition: "при положительном заключении Управления рисков КИБ и Департамента комплаенса КИБ"
    credit_level3:
      limit: "свыше 2 млрд руб."
      approver: "Правление Банка"
      condition: "при положительных заключениях Кредитного комитета КИБ, Управления рисков КИБ и Юридического департамента"

    # Обязательный контроль операций
    mandatory_control_threshold: "600 000 руб. и выше — для операций с наличными"
    suspicious_ops_threshold: "любая сумма — при наличии признаков необычности"

    # Торговые лимиты
    trading_var_limit: "не более 2% капитала Банка"
    trading_single_issuer: "не более 5% торгового портфеля на одного эмитента"
    trading_stop_loss_daily: "убыток 0.5% портфеля — приостановка торгов и эскалация"

    # Нормативы (из 220-И)
    n6_limit: "25% капитала — максимальный размер риска на одного заёмщика"
    n7_limit: "800% капитала — максимальный размер крупных кредитных рисков"

  # Категории риска клиентов
  client_risk_levels:
    - level: "низкий"
      code: "L"
      criteria: "резидент РФ, прозрачная структура владения, стандартная деятельность"
      review_period: "1 раз в 12 месяцев"
    - level: "средний"
      code: "M"
      criteria: "наличие нерезидентов в структуре, крупные обороты, отдельные факторы риска"
      review_period: "1 раз в 6 месяцев"
    - level: "высокий"
      code: "H"
      criteria: "сложная структура владения (3+ уровня), высокорисковые юрисдикции, ПДЛ"
      review_period: "1 раз в 3 месяца"
    - level: "неприемлемый"
      code: "X"
      criteria: "отказ в обслуживании"
      review_period: "не применимо"

  # Категории качества ссуд (из 590-П)
  loan_quality_categories:
    - category: "I (стандартные)"
      reserve_rate: "0%"
      financial_position: "хорошее"
      debt_service: "хорошее"
    - category: "II (нестандартные)"
      reserve_rate: "1-20%"
      financial_position: "хорошее/среднее"
      debt_service: "хорошее/среднее"
    - category: "III (сомнительные)"
      reserve_rate: "21-50%"
      financial_position: "среднее/плохое"
      debt_service: "среднее/плохое"
    - category: "IV (проблемные)"
      reserve_rate: "51-100%"
      financial_position: "плохое"
      debt_service: "среднее/плохое"
    - category: "V (безнадёжные)"
      reserve_rate: "100%"
      financial_position: "плохое"
      debt_service: "плохое"

# -----------------------------------------------------------------------------
# ШАБЛОН СТРУКТУРЫ ДОКУМЕНТА
# Применяется ко всем синтетическим документам
# -----------------------------------------------------------------------------
document_template:
  header:
    classification: "Для служебного пользования"
    approved_by: "Правление ПАО «ИнвестБанк»"
    default_date: "15.01.2025"
    status: "Действующий"
    review_period: "не реже 1 раза в год"

  sections:
    - "1. ОБЩИЕ ПОЛОЖЕНИЯ (цель, область применения, нормативные ссылки, термины, ответственные подразделения)"
    - "2. ОСНОВНАЯ ЧАСТЬ (конкретные процедуры, этапы, сроки, ответственные, пороговые значения)"
    - "3. КОНТРОЛЬ И ОТЧЁТНОСТЬ (порядок контроля исполнения, периодичность отчётности, формат отчётов)"
    - "4. ЗАКЛЮЧИТЕЛЬНЫЕ ПОЛОЖЕНИЯ (порядок внесения изменений, срок пересмотра, ответственный за актуализацию)"

  style_requirements:
    - "Сухой канцелярский язык, типичный для внутрибанковской документации"
    - "Многоуровневая нумерация пунктов (1.1, 1.1.1, 1.1.1.1)"
    - "Каждый процедурный пункт содержит: действие, ответственного, срок"
    - "Конкретные цифры, даты, пороговые значения — не использовать 'в установленном порядке' без конкретики"
    - "Ссылки на нормативные акты ЦБ: указывать конкретные пункты и статьи"
    - "Названия подразделений и должностей — строго из справочника банка"
    - "Включать таблицы там, где это повышает читаемость (матрицы решений, перечни документов)"

